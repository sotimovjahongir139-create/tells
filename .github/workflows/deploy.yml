name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 62.169.31.240
          username: root
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            export PATH="$PATH:/usr/local/bin:/usr/bin:/root/.local/bin"

            cd /root/calls
            git fetch origin
            git reset --hard origin/main
            npm install --omit=dev

            pm2 delete calls 2>/dev/null || true
            pm2 start ecosystem.config.js
            pm2 save
            sleep 3

            # Verify app is up on port 5002
            curl -sf http://127.0.0.1:5002/version

            # Fix nginx: ensure proxy_pass uses 127.0.0.1:5002 (avoids IPv6 ::1 mismatch)
            for cfg in /etc/nginx/sites-enabled/* /etc/nginx/conf.d/*.conf; do
              [ -f "$cfg" ] || continue
              if grep -q "proxy_pass" "$cfg"; then
                sed -i 's|proxy_pass http://localhost:[0-9]*|proxy_pass http://127.0.0.1:5002|g' "$cfg"
                sed -i 's|proxy_pass http://127\.0\.0\.1:[0-9]*|proxy_pass http://127.0.0.1:5002|g' "$cfg"
                echo "Patched nginx config: $cfg"
              fi
            done
            nginx -t && nginx -s reload
            echo "=== nginx reloaded ==="

            sleep 1
            curl -sf http://127.0.0.1:5002/version
            echo "Deploy OK"
