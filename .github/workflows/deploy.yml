name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 62.169.31.240
          username: root
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            set -e
            cd /root/calls
            git fetch origin
            git reset --hard origin/main
            npm install --omit=dev
            sleep 2
            curl -s http://localhost:5002/version || echo "waiting..."
